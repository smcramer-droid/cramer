# Dispatchable diagnostic for /api/catalog.
# Best-effort: every step is defensive, dumps raw output, and does not
# exit the workflow on soft failures — we want to SEE the responses, not
# fail out before they're captured.
name: Diagnose Catalog API

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: [".github/workflows/diagnose-catalog-api.yml"]

jobs:
  diagnose:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      PROJECT: pasadena-equipment
      BASE: https://pasadena-equipment.pages.dev
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Pages project config
        id: project
        continue-on-error: true
        run: |
          set +e
          OUT=/tmp/step1.md
          : > "$OUT"
          echo "## 1. Pages project config" >> "$OUT"
          echo "" >> "$OUT"
          echo '```json' >> "$OUT"
          PROJ=$(curl -sS -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${PROJECT}" || echo '{"error":"curl_failed"}')
          # pretty-print if parseable, else raw
          echo "$PROJ" | jq '.' 2>/dev/null || echo "$PROJ"
          echo '```' >> "$OUT"

          {
            echo ""
            echo "Response saved to /tmp/proj.json"
          } >> "$OUT"
          echo "$PROJ" > /tmp/proj.json

          TOKEN=$(echo "$PROJ" | jq -r '.result.deployment_configs.production.env_vars.CATALOG_EDIT_TOKEN.value // empty' 2>/dev/null || true)
          KV_ID=$(echo "$PROJ" | jq -r '.result.deployment_configs.production.kv_namespaces.CATALOG.namespace_id // empty' 2>/dev/null || true)
          DEP_ID=$(echo "$PROJ" | jq -r '.result.latest_deployment.id // empty' 2>/dev/null || true)

          echo "" >> "$OUT"
          echo "- **CATALOG_EDIT_TOKEN configured:** $([ -n "$TOKEN" ] && echo yes || echo NO)" >> "$OUT"
          echo "- **CATALOG KV namespace bound:** $([ -n "$KV_ID" ] && echo "yes ($KV_ID)" || echo NO)" >> "$OUT"
          echo "- **Latest deployment id:** ${DEP_ID:-unknown}" >> "$OUT"

          if [ -n "$TOKEN" ]; then echo "::add-mask::$TOKEN"; fi
          {
            echo "token=${TOKEN}"
            echo "kv_id=${KV_ID}"
            echo "dep_id=${DEP_ID}"
          } >> "$GITHUB_OUTPUT"

          cat "$OUT" >> "$GITHUB_STEP_SUMMARY"
          cat "$OUT"

      - name: Latest deployment details
        continue-on-error: true
        env:
          DEP_ID: ${{ steps.project.outputs.dep_id }}
        run: |
          set +e
          OUT=/tmp/step2.md
          : > "$OUT"
          echo "## 2. Latest deployment details" >> "$OUT"
          echo "" >> "$OUT"
          if [ -z "$DEP_ID" ]; then
            echo "_No latest deployment id; skipping._" >> "$OUT"
            cat "$OUT" >> "$GITHUB_STEP_SUMMARY"
            cat "$OUT"
            exit 0
          fi
          DEP=$(curl -sS -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${PROJECT}/deployments/${DEP_ID}" || echo '{"error":"curl_failed"}')
          echo '```json' >> "$OUT"
          echo "$DEP" | jq '.' 2>/dev/null || echo "$DEP"
          echo '```' >> "$OUT"
          cat "$OUT" >> "$GITHUB_STEP_SUMMARY"
          cat "$OUT"

      - name: Probe endpoints
        continue-on-error: true
        env:
          TOKEN: ${{ steps.project.outputs.token }}
        run: |
          set +e
          OUT=/tmp/step3.md
          : > "$OUT"
          echo "## 3. Endpoint probes" >> "$OUT"

          probe() {
            METHOD="$1"; URL="$2"; shift; shift
            echo "" >> "$OUT"
            echo "### \`$METHOD\` $URL" >> "$OUT"
            echo "" >> "$OUT"
            echo '```' >> "$OUT"
            curl -sS -D /tmp/h.txt -o /tmp/b.txt -X "$METHOD" "$URL" "$@" \
              -w 'HTTP %{http_code}  size %{size_download}B  time %{time_total}s\n' \
              >> "$OUT" 2>&1
            echo "" >> "$OUT"
            echo "--- response headers ---" >> "$OUT"
            cat /tmp/h.txt >> "$OUT" 2>&1 || true
            echo "--- response body (first 1500 chars) ---" >> "$OUT"
            head -c 1500 /tmp/b.txt >> "$OUT" 2>&1 || true
            echo "" >> "$OUT"
            echo '```' >> "$OUT"
          }

          probe GET     "${BASE}/api/ping"
          probe GET     "${BASE}/api/catalog"
          probe OPTIONS "${BASE}/api/catalog" \
            -H "Origin: ${BASE}" \
            -H "Access-Control-Request-Method: PUT" \
            -H "Access-Control-Request-Headers: content-type, x-edit-token"

          if [ -n "$TOKEN" ]; then
            probe PUT "${BASE}/api/catalog" \
              -H "content-type: application/json" \
              -H "X-Edit-Token: $TOKEN" \
              --data '[{"id":"_diag","label":"Diagnostic","options":[{"id":"none","label":"— Select —"}]}]'
            probe GET "${BASE}/api/catalog"
            # Reset to empty array so diagnostic doesn't leave stale data.
            curl -sS -X PUT "${BASE}/api/catalog" \
              -H "content-type: application/json" \
              -H "X-Edit-Token: $TOKEN" \
              --data '[]' >/dev/null
          else
            echo "" >> "$OUT"
            echo "**No token — skipping PUT probe.**" >> "$OUT"
          fi

          cat "$OUT" >> "$GITHUB_STEP_SUMMARY"
          cat "$OUT"

      - name: Publish diagnostic output to _diagnostic-output branch
        if: always()
        run: |
          set +e
          # Collect whatever step output we captured
          mkdir -p _diag
          for f in /tmp/step1.md /tmp/step2.md /tmp/step3.md; do
            [ -f "$f" ] && cat "$f" >> _diag/last-run.md && echo "" >> _diag/last-run.md
          done
          # Stamp
          {
            echo ""
            echo "---"
            echo "Generated at: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "Commit: ${GITHUB_SHA}"
            echo "Run: ${GITHUB_RUN_ID}"
          } >> _diag/last-run.md

          # Commit onto a detached branch and force-push
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git checkout --orphan _diagnostic-output
          git rm -rf --cached . 2>/dev/null
          # wipe working tree except _diag
          find . -mindepth 1 -maxdepth 1 ! -name '.git' ! -name '_diag' -exec rm -rf {} +
          git add -f _diag/last-run.md
          git commit -m "diag $(date -u +%Y%m%d-%H%M%SZ)" --allow-empty
          git push -f origin _diagnostic-output

      - name: Final verdict (does not fail the job)
        if: always()
        run: |
          echo "Diagnostic done. See the Summary tab or the _diagnostic-output branch."
