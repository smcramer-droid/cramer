# Deploys equipment-selector/ to Cloudflare Pages as a production deploy.
# URL: https://pasadena-equipment.pages.dev
# Requires repo secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID.
name: Deploy Equipment Selector

on:
  push:
    branches:
      - main
      - claude/mobile-tools-dashboard-MXI5X
    paths:
      - equipment-selector/**
      - .github/workflows/deploy-equipment.yml
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Inspect what we're about to deploy
        run: |
          echo "=== equipment-selector tree ==="
          find equipment-selector -maxdepth 5 -type f | sort
          echo ""
          echo "=== package.json ==="
          cat equipment-selector/package.json || echo "(missing)"
          echo ""
          echo "=== functions/api files ==="
          for f in equipment-selector/functions/api/*.js; do
            echo "--- $f ---"
            head -20 "$f"
            echo ""
          done

      - name: Ensure Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@3.90.0 pages project create pasadena-equipment \
            --production-branch=main || true

      - name: Deploy to Cloudflare Pages (production)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_LOG: debug
        run: |
          npx --yes wrangler@3.90.0 pages deploy equipment-selector \
            --project-name=pasadena-equipment \
            --branch=main \
            --commit-dirty=true 2>&1 | tee wrangler.log
          echo ""
          echo "=== wrangler.log function/route-related lines ==="
          grep -iE 'function|worker|compiled|bundled|error|warn|_worker|_routes|skipped|uploading' wrangler.log || echo "(no function-related output found)"

      - name: Verify Functions are live
        run: |
          set +e
          # Give the deploy a moment to propagate to the edge.
          sleep 15
          BASE=https://pasadena-equipment.pages.dev
          FAIL=0

          echo "--- GET ${BASE}/api/ping ---"
          PING=$(curl -fsSL "${BASE}/api/ping" || true)
          echo "ping response: $PING"
          case "$PING" in
            *'"ok":true'*) echo "  OK" ;;
            *) echo "  FAIL: /api/ping did not return {\"ok\":true}"; FAIL=1 ;;
          esac

          echo ""
          echo "--- GET ${BASE}/api/catalog ---"
          # Must return JSON (either null or an array), not HTML.
          CAT=$(curl -sS "${BASE}/api/catalog" || true)
          CAT_CODE=$(curl -s -o /dev/null -w '%{http_code}' "${BASE}/api/catalog" || true)
          echo "HTTP $CAT_CODE"
          echo "body (first 200 chars): ${CAT:0:200}"
          case "$CAT_CODE" in
            200) ;;
            *) echo "  FAIL: /api/catalog GET returned $CAT_CODE"; FAIL=1 ;;
          esac
          case "$CAT" in
            '<'*|*'<!DOCTYPE'*|*'<html'*) echo "  FAIL: /api/catalog returned HTML — functions route didn't match"; FAIL=1 ;;
            *) echo "  OK (not HTML)" ;;
          esac

          echo ""
          echo "--- OPTIONS ${BASE}/api/catalog ---"
          OPT_CODE=$(curl -sS -o /dev/null -X OPTIONS -w '%{http_code}' "${BASE}/api/catalog" || true)
          echo "HTTP $OPT_CODE"
          case "$OPT_CODE" in
            204|200) echo "  OK" ;;
            *) echo "  FAIL: /api/catalog OPTIONS returned $OPT_CODE (expected 204)"; FAIL=1 ;;
          esac

          if [ "$FAIL" -ne 0 ]; then
            echo ""
            echo "One or more verification checks failed. See details above."
            exit 1
          fi
          echo ""
          echo "All verification checks passed."

      - name: Publish wrangler.log to _diagnostic-output branch (always)
        if: always()
        run: |
          set +e
          mkdir -p _diag
          {
            echo "## Deploy Equipment Selector — commit ${GITHUB_SHA}"
            echo ""
            echo "Run: ${GITHUB_RUN_ID}"
            echo ""
            echo '### equipment-selector tree'
            echo '```'
            find equipment-selector -maxdepth 5 -type f | sort 2>&1
            echo '```'
            echo ""
            echo '### wrangler.log'
            echo '```'
            cat wrangler.log 2>/dev/null || echo "(no wrangler.log)"
            echo '```'
          } > _diag/deploy.md

          git config user.name "github-actions"
          git config user.email "actions@github.com"
          # Keep existing _diag/last-run.md if present
          git fetch origin _diagnostic-output 2>/dev/null || true
          git checkout -B _diagnostic-output
          # Wipe tree, keep .git and _diag/
          find . -mindepth 1 -maxdepth 1 ! -name '.git' ! -name '_diag' -exec rm -rf {} +
          git add -f _diag/deploy.md
          git commit -m "deploy-log $(date -u +%Y%m%d-%H%M%SZ)" --allow-empty
          git push -f origin _diagnostic-output
