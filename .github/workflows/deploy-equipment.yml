# Deploys equipment-selector/ to Cloudflare Pages as a production deploy.
# URL: https://pasadena-equipment.pages.dev
# Requires repo secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID.
name: Deploy Equipment Selector

on:
  push:
    branches:
      - main
      - claude/mobile-tools-dashboard-MXI5X
    paths:
      - equipment-selector/**
      - .github/workflows/deploy-equipment.yml
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Ensure Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@latest pages project create pasadena-equipment \
            --production-branch=main || true

      - name: Deploy to Cloudflare Pages (production)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@latest pages deploy equipment-selector \
            --project-name=pasadena-equipment \
            --branch=main \
            --commit-dirty=true 2>&1 | tee wrangler.log
          echo ""
          echo "=== wrangler.log post-deploy check ==="
          grep -iE 'function|worker|compiled|bundled|error|warn' wrangler.log || echo "(no function-related output found)"

      - name: Verify Functions are live
        run: |
          # Give the deploy a moment to propagate to the edge, then hit the
          # diagnostic endpoint. If this returns HTML, the deploy didn't
          # include Functions and the job should fail loudly.
          sleep 15
          echo "--- HEAD /api/ping ---"
          curl -sI https://pasadena-equipment.pages.dev/api/ping | head -n 20 || true
          echo ""
          echo "--- GET /api/ping ---"
          RESP=$(curl -fsSL https://pasadena-equipment.pages.dev/api/ping || true)
          echo "ping response: $RESP"
          case "$RESP" in
            *'"ok":true'*) echo "OK: Functions are live." ;;
            *) echo "FAIL: /api/ping did not return the expected JSON." ; exit 1 ;;
          esac
