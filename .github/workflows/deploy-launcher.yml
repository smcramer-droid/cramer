# Deploys the repo root (index.html) to Cloudflare Pages as a production deploy.
# URL: https://pool-launcher.pages.dev
# Requires repo secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID.
name: Deploy Pool Launcher

on:
  push:
    branches:
      - main
      - claude/mobile-tools-dashboard-MXI5X
    paths:
      - index.html
      - logo.png
      - .github/workflows/deploy-launcher.yml
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Stage site files
        run: |
          mkdir -p _site
          cp index.html _site/
          [ -f logo.png ] && cp logo.png _site/ || true

      - name: Ensure Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@latest pages project create pool-launcher \
            --production-branch=main || true

      - name: Deploy to Cloudflare Pages (production)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@latest pages deploy _site \
            --project-name=pool-launcher \
            --branch=main \
            --commit-dirty=true
