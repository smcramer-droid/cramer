# Deploys pool-designer/ to Cloudflare Pages.
# Requires repo secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID.
name: Deploy Pool Designer

on:
  push:
    branches:
      - main
      - claude/implement-pool-designer-1Bby3
    paths:
      - pool-designer/**
      - .github/workflows/deploy-pool-designer.yml
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@latest pages deploy pool-designer \
            --project-name=pool-designer \
            --branch="${GITHUB_REF_NAME}" \
            --commit-dirty=true
