# Deploys pool-designer/ to Cloudflare Pages as a production deploy.
# URL: https://pool-design.pages.dev
# Requires repo secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID.
name: Deploy Pool Designer

on:
  push:
    branches:
      - main
      - claude/implement-pool-designer-1Bby3
    paths:
      - pool-designer/**
      - .github/workflows/deploy-pool-designer.yml
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Inventory deploy directory (debug)
        run: |
          echo "=== pool-designer tree ==="
          find pool-designer -maxdepth 4 -type f | sort
          echo ""
          echo "=== Function files ==="
          find pool-designer/functions -type f -name '*.js' 2>/dev/null | sort || echo "NO functions/ DIRECTORY"
          echo ""
          echo "=== package.json contents ==="
          cat pool-designer/package.json || echo "NO package.json"
          echo ""
          echo "=== file sizes ==="
          du -ab pool-designer/functions 2>/dev/null || true

      - name: Ensure Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@3 pages project create pool-design \
            --production-branch=main || true

      - name: Deploy to Cloudflare Pages (production)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        # wrangler@3 detects `functions/` relative to CWD, not relative to
        # the deploy directory argument — so running
        # `wrangler pages deploy pool-designer` from the repo root silently
        # skips Functions bundling. Run from inside pool-designer/ with `.`.
        working-directory: pool-designer
        run: |
          npx --yes wrangler@3.90.0 pages deploy . \
            --project-name=pool-design \
            --branch=main \
            --commit-dirty=true 2>&1 | tee wrangler.log
          echo ""
          echo "=== wrangler.log post-deploy check ==="
          if grep -q 'Uploading Functions bundle' wrangler.log; then
            echo "OK: Functions bundle was uploaded."
          else
            echo "FAIL: wrangler did not upload a Functions bundle." >&2
            exit 1
          fi

      - name: Verify Functions are live
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          # Give the deploy a moment to propagate to the edge, then hit the
          # diagnostic endpoint. If this returns HTML, the deploy didn't
          # include Functions and the job should fail loudly.
          sleep 15
          echo "--- HEAD /api/ping ---"
          curl -sI https://pool-design.pages.dev/api/ping | head -n 20 || true
          echo ""
          echo "--- GET /api/ping ---"
          RESP=$(curl -fsSL https://pool-design.pages.dev/api/ping || true)
          echo "ping response: $RESP"
          case "$RESP" in
            *'"ok":true'*) echo "OK: Functions are live." ;;
            *) echo "FAIL: /api/ping did not return the expected JSON." ; exit 1 ;;
          esac
