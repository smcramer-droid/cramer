# Deploys pool-care-generator/ to Cloudflare Pages as a production deploy.
# URL: https://pool-care-generator.pages.dev
# Requires repo secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID.
name: Deploy Pool Care Generator

on:
  push:
    branches:
      - main
    paths:
      - pool-care-generator/**
      - .github/workflows/deploy-pool-care.yml
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Ensure Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@latest pages project create pool-care-generator \
            --production-branch=main || true

      - name: Deploy to Cloudflare Pages (production)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@latest pages deploy pool-care-generator \
            --project-name=pool-care-generator \
            --branch=main \
            --commit-dirty=true
