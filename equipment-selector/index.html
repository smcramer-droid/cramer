<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ff8a3d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Equipment Selector" />
    <link rel="apple-touch-icon" href="logo.png" />
    <link rel="icon" href="logo.png" />
    <title>Pasadena Pools · Equipment Selector</title>
    <style>
      :root {
        --bg-0: #fff4e3;
        --bg-1: #cdeef7;
        --bg-2: #ffe0c2;
        --ink: #123a4a;
        --ink-soft: #4a6a7a;
        --brand: #ff8a3d;
        --brand-2: #ffb347;
        --sky: #29c1e0;
        --sky-2: #67d8eb;
        --sun: #ffd166;
        --leaf: #3dd598;
        --danger: #e25555;
        --card: #ffffff;
        --card-border: rgba(18, 58, 74, 0.1);
        --shadow: 0 12px 28px -14px rgba(255, 138, 61, 0.25),
          0 2px 8px -2px rgba(41, 193, 224, 0.15);
        --radius: 18px;
      }

      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }

      body {
        min-height: 100svh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        color: var(--ink);
        background:
          radial-gradient(1200px 600px at 10% -10%, var(--bg-1), transparent 65%),
          radial-gradient(900px 500px at 110% 10%, var(--bg-2), transparent 60%),
          var(--bg-0);
        -webkit-font-smoothing: antialiased;
        -webkit-tap-highlight-color: transparent;
      }

      .container {
        max-width: 820px;
        margin: 0 auto;
        padding:
          max(env(safe-area-inset-top), 18px)
          max(env(safe-area-inset-right), 16px)
          max(env(safe-area-inset-bottom), 28px)
          max(env(safe-area-inset-left), 16px);
      }

      header.page-header {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 10px;
        padding: 14px 0 20px;
      }

      .page-header img.logo {
        max-height: 56px;
        width: auto;
      }

      h1 { font-size: 22px; margin: 0; letter-spacing: -0.01em; }
      .tagline { color: var(--ink-soft); font-size: 14px; margin: 0; }

      .back-link {
        align-self: flex-start;
        color: var(--sky);
        text-decoration: none;
        font-size: 13px;
        margin-bottom: 4px;
      }
      .back-link:hover { text-decoration: underline; }

      section.card {
        background: var(--card);
        border: 1px solid var(--card-border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 18px;
        margin: 0 0 16px;
      }

      .card h2 {
        font-size: 15px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--ink-soft);
        margin: 0 0 14px;
        font-weight: 700;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 12px;
      }

      label {
        font-size: 13px;
        font-weight: 600;
        color: var(--ink);
      }
      label .sub { font-weight: 400; color: var(--ink-soft); margin-left: 6px; font-size: 12px; }

      input[type="text"],
      input[type="number"],
      input[type="date"],
      select,
      textarea {
        font: inherit;
        color: var(--ink);
        background: #fbfbfb;
        border: 1.5px solid rgba(18, 58, 74, 0.15);
        border-radius: 12px;
        padding: 10px 12px;
        min-height: 42px;
        width: 100%;
      }

      input:focus, select:focus, textarea:focus {
        outline: none;
        border-color: var(--sky);
        box-shadow: 0 0 0 3px rgba(41, 193, 224, 0.2);
      }

      .row-2 {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }
      @media (min-width: 560px) {
        .row-2 { grid-template-columns: 1fr 1fr; }
      }

      .item {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        padding: 14px;
        border: 1.5px solid rgba(18, 58, 74, 0.08);
        border-radius: 14px;
        margin-bottom: 10px;
        background: #fdfdfd;
      }
      .item-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .item-title { font-weight: 700; font-size: 15px; }
      .item-qty {
        display: grid;
        grid-template-columns: 90px 1fr;
        gap: 10px;
        align-items: start;
      }
      .item-info {
        font-size: 12px;
        color: var(--ink-soft);
        line-height: 1.4;
        padding-top: 4px;
      }

      .hint {
        background: rgba(41, 193, 224, 0.12);
        color: #0e6b7f;
        border-radius: 10px;
        padding: 8px 10px;
        font-size: 12px;
        line-height: 1.4;
        margin: 6px 0 0;
      }
      .hint strong { color: var(--ink); }

      .add-misc {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: linear-gradient(135deg, var(--sky) 0%, var(--sky-2) 100%);
        color: #fff;
        font-weight: 600;
        border: 0;
        border-radius: 999px;
        padding: 10px 18px;
        cursor: pointer;
        font-size: 14px;
      }
      .add-misc:active { transform: scale(0.98); }

      .misc-row {
        display: grid;
        grid-template-columns: 1fr 90px 36px;
        gap: 8px;
        margin-bottom: 8px;
        align-items: start;
      }
      .misc-row input[type="text"] { min-height: 38px; }
      .misc-row .remove-misc {
        background: rgba(226, 85, 85, 0.1);
        border: 1.5px solid rgba(226, 85, 85, 0.3);
        color: var(--danger);
        border-radius: 10px;
        min-height: 38px;
        cursor: pointer;
        font-size: 18px;
        padding: 0;
      }
      .misc-row .remove-misc:hover { background: rgba(226, 85, 85, 0.2); }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
        margin: 18px 0 8px;
      }

      .btn {
        font: inherit;
        font-weight: 600;
        color: #fff;
        border: 0;
        border-radius: 999px;
        padding: 12px 20px;
        cursor: pointer;
        font-size: 14px;
      }
      .btn:active { transform: scale(0.98); }
      .btn--print { background: linear-gradient(135deg, var(--brand) 0%, var(--brand-2) 100%); }
      .btn--copy { background: linear-gradient(135deg, var(--leaf) 0%, var(--sun) 100%); color: #123a4a; }
      .btn--csv { background: linear-gradient(135deg, var(--sky) 0%, var(--sky-2) 100%); }

      .summary table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }
      .summary th {
        text-align: left;
        padding: 8px 10px;
        background: rgba(41, 193, 224, 0.12);
        color: var(--ink);
        font-weight: 700;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .summary td {
        padding: 10px;
        border-bottom: 1px solid rgba(18, 58, 74, 0.08);
        vertical-align: top;
      }
      .summary tr:last-child td { border-bottom: 0; }
      .summary .empty {
        text-align: center;
        color: var(--ink-soft);
        font-style: italic;
        padding: 20px 10px;
      }
      .summary .qty-col { text-align: right; width: 64px; }

      .proj-meta {
        display: none;
        font-size: 13px;
        color: var(--ink-soft);
        margin: 0 0 10px;
      }

      footer { text-align: center; color: var(--ink-soft); font-size: 12px; margin-top: 22px; }

      @media print {
        body {
          background: #fff;
        }
        .container { max-width: 100%; padding: 16px; }
        .no-print, .actions, .back-link { display: none !important; }
        section.card {
          box-shadow: none;
          border: 1px solid #ddd;
          break-inside: avoid;
          margin-bottom: 12px;
        }
        .proj-meta { display: block; }
        .page-header img.logo { max-height: 48px; }
        h1 { font-size: 20px; }
        .summary table { font-size: 12px; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <a class="back-link no-print" href="https://pasadenapools.pages.dev/">&larr; Launcher</a>
      <header class="page-header">
        <img class="logo" src="logo.png" alt="Pasadena Pools" onerror="this.style.display='none'" />
        <h1>Equipment Selector</h1>
        <p class="tagline no-print">Pick the equipment for a new pool build and export the list.</p>
      </header>

      <section class="card no-print">
        <h2>Project</h2>
        <div class="row-2">
          <div class="field">
            <label for="projName">Project / Job Name</label>
            <input type="text" id="projName" autocomplete="off" />
          </div>
          <div class="field">
            <label for="projCustomer">Customer</label>
            <input type="text" id="projCustomer" autocomplete="off" />
          </div>
        </div>
        <div class="row-2">
          <div class="field">
            <label for="projSales">Salesperson</label>
            <input type="text" id="projSales" autocomplete="off" />
          </div>
          <div class="field">
            <label for="projDate">Date</label>
            <input type="date" id="projDate" />
          </div>
        </div>
        <div class="field">
          <label for="poolGal">Pool volume <span class="sub">(gallons — drives salt cell sizing)</span></label>
          <input type="number" id="poolGal" min="0" step="500" placeholder="e.g. 20000" />
        </div>
      </section>

      <section class="card">
        <h2>Core Equipment</h2>
        <div id="coreItems"></div>
      </section>

      <section class="card">
        <h2>Miscellaneous / Additional</h2>
        <div id="miscItems"></div>
        <button type="button" class="add-misc no-print" id="addMisc">+ Add item</button>
      </section>

      <section class="card summary">
        <h2>Equipment List</h2>
        <p class="proj-meta" id="projMeta"></p>
        <table>
          <thead>
            <tr>
              <th class="qty-col">Qty</th>
              <th>Item</th>
              <th>Model</th>
              <th>Notes</th>
            </tr>
          </thead>
          <tbody id="summaryBody"></tbody>
        </table>
        <div class="actions no-print">
          <button type="button" class="btn btn--print" id="btnPrint">Print / Save PDF</button>
          <button type="button" class="btn btn--copy" id="btnCopy">Copy as text</button>
          <button type="button" class="btn btn--csv" id="btnCsv">Download CSV</button>
        </div>
      </section>

      <footer>Pasadena Pools &middot; Equipment Selector</footer>
    </div>

    <script>
      // ============ CATALOG ============
      // Each category: id, label, options[{id,label,model,manufacturer,info}]
      // "none" option lets the user skip a category.
      const CATALOG = [
        {
          id: "circPump",
          label: "Circulation Pump",
          options: [
            { id: "none", label: "— Select —" },
            { id: "plp300s", label: "Aquastar PLP300S — 3 HP Variable Speed", model: "PLP300S", manufacturer: "Aquastar", info: "240V 20A" },
            { id: "plp150s", label: "Aquastar PLP150S — 1.5 HP Variable Speed", model: "PLP150S", manufacturer: "Aquastar", info: "240V 20A" },
            { id: "intelliflo3", label: "Pentair IntelliFlo3 VSF", model: "IntelliFlo3", manufacturer: "Pentair", info: "Variable speed" },
            { id: "whisperfloxf", label: "Pentair WhisperFlo XF VS", model: "WhisperFlo XF VS", manufacturer: "Pentair", info: "Up to 5 HP" },
            { id: "eq750", label: "Pentair EQ-750 7.5 HP", model: "EQ-750", manufacturer: "Pentair", info: "Commercial" }
          ]
        },
        {
          id: "filter",
          label: "Filter",
          options: [
            { id: "none", label: "— Select —" },
            { id: "plf35000", label: "Aquastar PLF35000 — Pipeline 96K gallon cartridge", model: "PLF35000", manufacturer: "Aquastar", info: "No power required" },
            { id: "plf27000", label: "Aquastar PLF27000 — Pipeline cartridge", model: "PLF27000", manufacturer: "Aquastar", info: "No power required" },
            { id: "tr40", label: "Pentair Triton TR-40 — Hi-rate sand", model: "PEN140264 (TR-40)", manufacturer: "Pentair", info: "Sand filter" },
            { id: "tr100c", label: "Pentair Triton TR-100C — Sand", model: "TR-100C", manufacturer: "Pentair", info: "Sand filter" },
            { id: "tr140c", label: "Pentair Triton TR-140C — Sand", model: "TR-140C", manufacturer: "Pentair", info: "Sand filter" }
          ]
        },
        {
          id: "heater",
          label: "Heater",
          options: [
            { id: "none", label: "— Select —" },
            { id: "jxiq400nk", label: "Jandy JXIQ400NK — 400K BTU NG", model: "JXIQ400NK", manufacturer: "Jandy", info: "400K BTU natural gas" },
            { id: "jxiq250nk", label: "Jandy JXIQ250NK — 250K BTU NG", model: "JXIQ250NK", manufacturer: "Jandy", info: "250K BTU natural gas" },
            { id: "etilp", label: "Pentair ETI461113 — 400K BTU propane", model: "ETI461113", manufacturer: "Pentair", info: "240/120V 15A, propane" },
            { id: "mastertemp400", label: "Pentair MasterTemp ASME 400K BTU", model: "MasterTemp 400", manufacturer: "Pentair", info: "400K BTU" },
            { id: "pen460736", label: "Pentair 460736 — 400K BTU", model: "460736", manufacturer: "Pentair", info: "400K BTU NG" },
            { id: "pen462026", label: "Pentair 462026 — 250K BTU", model: "462026", manufacturer: "Pentair", info: "250K BTU NG" }
          ]
        },
        {
          id: "lights",
          label: "Lights",
          options: [
            { id: "none", label: "— Select —" },
            { id: "treomax", label: "PAL Treo Max (64-EGTMX-80)", model: "64-EGTMX-80", manufacturer: "PAL", info: "24V to lights / 120V to driver" },
            { id: "treominiplus", label: "PAL Treo Mini Plus (64-EGTSM-V2-150)", model: "64-EGTSM-V2-150", manufacturer: "PAL", info: "24V to lights / 120V to driver" },
            { id: "intellibrite500", label: "Pentair IntelliBrite 500W White", model: "IntelliBrite 500W", manufacturer: "Pentair", info: "12/120V" },
            { id: "intellibrite100", label: "Pentair IntelliBrite 100W White", model: "IntelliBrite 100W", manufacturer: "Pentair", info: "12/120V" },
            { id: "microbrite", label: "Pentair MicroBrite White LED", model: "MicroBrite", manufacturer: "Pentair", info: "12V" }
          ],
          defaultQty: 4
        },
        {
          id: "lightDriver",
          label: "Light Driver / Controller",
          options: [
            { id: "none", label: "— Select —" },
            { id: "pcr2dmx65", label: "PAL 65W Driver (64-PCR-2DMX-65)", model: "64-PCR-2DMX-65", manufacturer: "PAL", info: "65W, 7–10 lights" },
            { id: "pcr3dmx120", label: "PAL 120W Driver (64-PCR-3DMX-120)", model: "64-PCR-3DMX-120", manufacturer: "PAL", info: "120W" }
          ]
        },
        {
          id: "controller",
          label: "Poolside Controller (Automation)",
          options: [
            { id: "none", label: "— Select —" },
            { id: "attmini", label: "Poolside Tech Attendant Mini", model: "ATT-Mini", manufacturer: "Poolside Tech", info: "120V or 240V, 15A" },
            { id: "att", label: "Poolside Tech Attendant", model: "ATT", manufacturer: "Poolside Tech", info: "120V or 240V, 15A" }
          ]
        },
        {
          id: "checkValve",
          label: "Check Valve",
          options: [
            { id: "none", label: "— Select —" },
            { id: "jandy2", label: 'Jandy 2" Check Valve', model: "7305", manufacturer: "Jandy", info: "1 lb spring, 2\" socket" },
            { id: "jandy25", label: 'Jandy 2–2.5" Check Valve', model: "7235", manufacturer: "Jandy", info: "2\"/2.5\" socket" },
            { id: "pentair2", label: 'Pentair 2" Check Valve', model: "263041", manufacturer: "Pentair", info: "2\" socket" },
            { id: "pentair25", label: 'Pentair 2.5" Check Valve', model: "263042", manufacturer: "Pentair", info: "2.5\" socket" }
          ]
        },
        {
          id: "saltCell",
          label: "Salt Cell (Pentair IntelliChlor)",
          options: [
            { id: "none", label: "— Select —" },
            { id: "ic15", label: "IntelliChlor IC15 — up to 15,000 gal", model: "520888 (IC15)", manufacturer: "Pentair", info: "Self-contained power supply — no external power center" },
            { id: "ic20", label: "IntelliChlor IC20 — up to 20,000 gal", model: "520554 (IC20)", manufacturer: "Pentair", info: "Requires 520556 power center" },
            { id: "ic40", label: "IntelliChlor IC40 — up to 40,000 gal", model: "520555 (IC40)", manufacturer: "Pentair", info: "Requires 520556 power center" },
            { id: "ic60", label: "IntelliChlor IC60 — up to 60,000 gal", model: "521105 (IC60)", manufacturer: "Pentair", info: "Requires 520556 power center" }
          ]
        },
        {
          id: "saltPower",
          label: "Salt Cell Power Center",
          options: [
            { id: "none", label: "— Select / auto —" },
            { id: "ic_bundled", label: "Bundled with IC15 (no external power center)", model: "—", manufacturer: "Pentair", info: "IC15 has a built-in power supply" },
            { id: "pc520556", label: "Pentair IntelliChlor Power Center 520556", model: "520556", manufacturer: "Pentair", info: "Pairs with IC20/IC40/IC60, 110/230 VAC" }
          ]
        }
      ];

      // ============ STATE / RENDER ============
      const state = {
        core: {},   // id -> { optionId, qty }
        misc: [],   // [{ id, name, qty }]
        project: {}
      };

      function el(tag, attrs = {}, children = []) {
        const n = document.createElement(tag);
        for (const [k, v] of Object.entries(attrs)) {
          if (k === "class") n.className = v;
          else if (k === "dataset") Object.assign(n.dataset, v);
          else if (k in n) n[k] = v;
          else n.setAttribute(k, v);
        }
        for (const c of [].concat(children)) {
          if (c == null) continue;
          n.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
        }
        return n;
      }

      function renderCore() {
        const host = document.getElementById("coreItems");
        host.innerHTML = "";
        for (const cat of CATALOG) {
          const prev = state.core[cat.id] || {};
          const select = el("select", { id: `sel_${cat.id}` });
          for (const opt of cat.options) {
            const o = el("option", { value: opt.id }, opt.label);
            if (prev.optionId === opt.id) o.selected = true;
            select.appendChild(o);
          }
          select.addEventListener("change", () => {
            state.core[cat.id] = { optionId: select.value, qty: state.core[cat.id]?.qty ?? cat.defaultQty ?? 1 };
            if (cat.id === "saltCell") autoPairSaltPower();
            saveAndRender();
          });

          const qty = el("input", {
            type: "number",
            min: "0",
            step: "1",
            id: `qty_${cat.id}`,
            value: prev.qty ?? cat.defaultQty ?? 1
          });
          qty.addEventListener("input", () => {
            state.core[cat.id] = { optionId: state.core[cat.id]?.optionId ?? "none", qty: Number(qty.value) || 0 };
            saveAndRender();
          });

          const info = el("div", { class: "item-info" });
          const selOpt = cat.options.find(o => o.id === (prev.optionId || "none"));
          if (selOpt && selOpt.id !== "none") {
            info.textContent = [selOpt.manufacturer, selOpt.model, selOpt.info].filter(Boolean).join(" · ");
          }

          const hint = el("div", { class: "hint" });
          if (cat.id === "saltCell") {
            const gal = Number(document.getElementById("poolGal")?.value || 0);
            if (gal > 0) {
              const rec = recommendSaltCell(gal);
              hint.innerHTML = `<strong>Recommended for ${gal.toLocaleString()} gal:</strong> ${rec.label} — sized ~2× pool volume.`;
            } else {
              hint.textContent = "Enter pool volume above to get a sizing recommendation.";
            }
          }

          const item = el("div", { class: "item" }, [
            el("div", { class: "item-head" }, [
              el("div", { class: "item-title" }, cat.label)
            ]),
            el("div", { class: "item-qty" }, [
              qty,
              select
            ]),
            info,
            (cat.id === "saltCell" || (cat.id === "saltPower" && state.core.saltCell?.optionId)) ? hint : null
          ].filter(Boolean));

          host.appendChild(item);
        }
      }

      function recommendSaltCell(gallons) {
        // Size cell for ~2x pool volume. Compare against cell caps.
        const needed = gallons * 2;
        if (needed <= 15000) return { id: "ic15", label: "IntelliChlor IC15" };
        if (needed <= 20000) return { id: "ic20", label: "IntelliChlor IC20" };
        if (needed <= 40000) return { id: "ic40", label: "IntelliChlor IC40" };
        return { id: "ic60", label: "IntelliChlor IC60" };
      }

      function autoPairSaltPower() {
        const cell = state.core.saltCell?.optionId;
        if (!cell || cell === "none") return;
        if (cell === "ic15") {
          state.core.saltPower = { optionId: "ic_bundled", qty: 1 };
        } else {
          state.core.saltPower = { optionId: "pc520556", qty: 1 };
        }
      }

      function renderMisc() {
        const host = document.getElementById("miscItems");
        host.innerHTML = "";
        if (state.misc.length === 0) {
          host.appendChild(el("div", { class: "item-info", style: "padding: 4px 0 8px;" }, "No extra items yet. Click + Add item to include anything outside the core list."));
        }
        for (const row of state.misc) {
          const nameInput = el("input", { type: "text", placeholder: "Item (e.g. Automatic Cover T4)", value: row.name });
          nameInput.addEventListener("input", () => { row.name = nameInput.value; saveAndRender(/*skipRender*/ true); updateSummary(); });

          const qtyInput = el("input", { type: "number", min: "0", step: "1", value: row.qty });
          qtyInput.addEventListener("input", () => { row.qty = Number(qtyInput.value) || 0; saveAndRender(true); updateSummary(); });

          const removeBtn = el("button", { type: "button", class: "remove-misc", title: "Remove", ariaLabel: "Remove" }, "\u00d7");
          removeBtn.addEventListener("click", () => {
            state.misc = state.misc.filter(r => r.id !== row.id);
            saveAndRender();
          });

          host.appendChild(el("div", { class: "misc-row" }, [nameInput, qtyInput, removeBtn]));
        }
      }

      function buildList() {
        const list = [];
        for (const cat of CATALOG) {
          const sel = state.core[cat.id];
          if (!sel || sel.optionId === "none" || !sel.qty) continue;
          const opt = cat.options.find(o => o.id === sel.optionId);
          if (!opt || opt.id === "none") continue;
          list.push({
            qty: sel.qty,
            item: cat.label,
            model: opt.model || "",
            manufacturer: opt.manufacturer || "",
            info: opt.info || "",
            label: opt.label
          });
        }
        for (const row of state.misc) {
          if (!row.name || !row.qty) continue;
          list.push({
            qty: row.qty,
            item: row.name,
            model: "",
            manufacturer: "",
            info: "Miscellaneous",
            label: row.name
          });
        }
        return list;
      }

      function updateSummary() {
        const body = document.getElementById("summaryBody");
        body.innerHTML = "";
        const list = buildList();
        if (list.length === 0) {
          const tr = el("tr");
          tr.appendChild(el("td", { class: "empty", colspan: "4" }, "Nothing selected yet."));
          body.appendChild(tr);
        } else {
          for (const r of list) {
            const notes = [r.manufacturer, r.info].filter(Boolean).join(" · ");
            body.appendChild(el("tr", {}, [
              el("td", { class: "qty-col" }, String(r.qty)),
              el("td", {}, r.item),
              el("td", {}, r.model),
              el("td", {}, notes)
            ]));
          }
        }

        // project meta (for print)
        const meta = document.getElementById("projMeta");
        const parts = [];
        if (state.project.projName) parts.push(`Project: ${state.project.projName}`);
        if (state.project.projCustomer) parts.push(`Customer: ${state.project.projCustomer}`);
        if (state.project.projSales) parts.push(`Salesperson: ${state.project.projSales}`);
        if (state.project.projDate) parts.push(`Date: ${state.project.projDate}`);
        meta.textContent = parts.join(" · ");
      }

      function saveAndRender(skipRender) {
        localStorage.setItem("pps.equipment.v1", JSON.stringify(state));
        if (!skipRender) {
          renderCore();
          renderMisc();
        }
        updateSummary();
      }

      function loadState() {
        try {
          const raw = localStorage.getItem("pps.equipment.v1");
          if (!raw) return;
          const s = JSON.parse(raw);
          if (s && typeof s === "object") {
            Object.assign(state, s);
            state.core = state.core || {};
            state.misc = state.misc || [];
            state.project = state.project || {};
          }
        } catch {}
      }

      // ============ PROJECT HEADER ============
      function wireProject() {
        for (const k of ["projName", "projCustomer", "projSales", "projDate", "poolGal"]) {
          const el = document.getElementById(k);
          if (state.project[k]) el.value = state.project[k];
          el.addEventListener("input", () => {
            state.project[k] = el.value;
            if (k === "poolGal") renderCore(); // refresh recommendation hint
            saveAndRender(true);
            updateSummary();
          });
        }
      }

      // ============ EXPORTS ============
      function toText() {
        const list = buildList();
        const lines = [];
        const p = state.project;
        lines.push("PASADENA POOLS — Equipment List");
        if (p.projName) lines.push(`Project:     ${p.projName}`);
        if (p.projCustomer) lines.push(`Customer:    ${p.projCustomer}`);
        if (p.projSales) lines.push(`Salesperson: ${p.projSales}`);
        if (p.projDate) lines.push(`Date:        ${p.projDate}`);
        if (p.poolGal) lines.push(`Pool size:   ${p.poolGal} gal`);
        lines.push("");
        if (list.length === 0) {
          lines.push("(No equipment selected)");
        } else {
          for (const r of list) {
            const notes = [r.manufacturer, r.info].filter(Boolean).join(" · ");
            const modelPart = r.model ? ` — ${r.model}` : "";
            const notePart = notes ? ` (${notes})` : "";
            lines.push(`${String(r.qty).padStart(3, " ")}  ${r.item}${modelPart}${notePart}`);
          }
        }
        return lines.join("\n");
      }

      function toCsv() {
        const list = buildList();
        const rows = [["Qty", "Item", "Model", "Manufacturer", "Notes"]];
        for (const r of list) rows.push([r.qty, r.item, r.model, r.manufacturer, r.info]);
        return rows.map(cols => cols.map(v => {
          const s = String(v ?? "");
          return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
        }).join(",")).join("\n");
      }

      function downloadFile(name, content, type) {
        const blob = new Blob([content], { type });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = name;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      }

      function wireActions() {
        document.getElementById("btnPrint").addEventListener("click", () => window.print());
        document.getElementById("btnCopy").addEventListener("click", async () => {
          const txt = toText();
          try {
            await navigator.clipboard.writeText(txt);
            flash("Copied to clipboard");
          } catch {
            // Fallback
            const ta = document.createElement("textarea");
            ta.value = txt;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand("copy");
            ta.remove();
            flash("Copied to clipboard");
          }
        });
        document.getElementById("btnCsv").addEventListener("click", () => {
          const name = (state.project.projName || "equipment-list").replace(/[^a-z0-9_-]+/gi, "_") + ".csv";
          downloadFile(name, toCsv(), "text/csv");
        });
        document.getElementById("addMisc").addEventListener("click", () => {
          state.misc.push({ id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()), name: "", qty: 1 });
          saveAndRender();
        });
      }

      function flash(msg) {
        const n = el("div", {
          style: "position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#123a4a;color:#fff;padding:10px 18px;border-radius:999px;font-size:14px;z-index:9999;box-shadow:0 10px 30px rgba(0,0,0,0.2);"
        }, msg);
        document.body.appendChild(n);
        setTimeout(() => n.remove(), 1600);
      }

      // ============ INIT ============
      loadState();
      // seed default date
      if (!state.project.projDate) {
        state.project.projDate = new Date().toISOString().slice(0, 10);
      }
      wireProject();
      renderCore();
      renderMisc();
      wireActions();
      updateSummary();
    </script>
  </body>
</html>
